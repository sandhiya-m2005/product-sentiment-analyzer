<!DOCTYPE html>
<html>
<head>
    <title>Product Sentiment Analyzer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <h1>📊 Product Sentiment Dashboard</h1>

    <textarea id="reviews" placeholder="Enter reviews (one per line)"></textarea>
    <button onclick="analyze()">Analyze Sentiment</button>

    <div class="stats">
        <div class="card positive">Positive: <span id="pos">0</span></div>
        <div class="card neutral">Neutral: <span id="neu">0</span></div>
        <div class="card negative">Negative: <span id="neg">0</span></div>
    </div>

    <canvas id="sentimentChart"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
